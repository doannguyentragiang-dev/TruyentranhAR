<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <title>AR Gốm Thanh Hà</title>
  </head>
  <body>
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.0001; filterBeta: 0.001;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <a-asset-item id="model-amtra" src="./amtra.glb"></a-asset-item>
        <a-asset-item id="model-binh" src="./binh.glb"></a-asset-item>
        <a-asset-item id="model-chen" src="./chen.glb"></a-asset-item>
        <a-asset-item id="model-noigom" src="./noigom.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model src="#model-amtra" rotation="0 0 0" position="0 0 0" scale="0.5 0.5 0.5"></a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-gltf-model src="#model-binh" rotation="0 0 0" position="0 0 0" scale="0.5 0.5 0.5"></a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 2">
        <a-gltf-model src="#model-chen" rotation="0 0 0" position="0 0 0" scale="0.5 0.5 0.5"></a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 3">
        <a-gltf-model src="#model-noigom" rotation="0 0 0" position="0 0 0" scale="0.5 0.5 0.5"></a-gltf-model>
      </a-entity>

    </a-scene>
  </body>
</html>
